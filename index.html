<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ESA Incidents — 24h Tally</title>
<style>
  :root {
    --esa-blue: #2f5f96;
    --ink: #2b2b2b;
    --muted: #6b7280;
    --bg: #f4f6f9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 24px 12px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  }
  .header {
    background: var(--esa-blue);
    color: #fff;
    padding: 30px 24px;
    text-align: center;
  }
  .header h1 {
    margin: 0;
    font-size: 30px;
    line-height: 1.15;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header p {
    margin: 8px 0 0;
    font-size: 13px;
    opacity: 0.85;
    font-weight: 500;
  }
  .rows { padding: 28px 24px 8px; }
  .row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 26px 0;
  }
  .row svg { width: 64px; height: 64px; flex: 0 0 auto; fill: #1f1f1f; }
  .count {
    font-size: 58px;
    font-weight: 800;
    min-width: 90px;
    text-align: left;
    font-variant-numeric: tabular-nums;
    transition: color .2s;
  }
  .label {
    text-align: center;
    color: var(--muted);
    font-size: 17px;
    margin: -14px 0 0;
  }
  .divider { height: 1px; background: #eef0f3; margin: 0 12px; }
  .footer {
    padding: 16px 24px 22px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }
  .footer a { color: var(--esa-blue); text-decoration: none; }
  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #16a34a; margin-right: 5px; vertical-align: middle;
  }
  .status-dot.stale { background: #d97706; }
  .status-dot.err { background: #dc2626; }
  .flash { animation: flash .9s ease; }
  @keyframes flash { 0% { color: #16a34a; } 100% { color: var(--ink); } }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>Emergency incidents<br>attended (last 24h)</h1>
      <p>ACT Emergency Services Agency · rolling tally</p>
    </div>

    <div class="rows">
      <div class="row">
        <!-- ambulance icon -->
        <svg viewBox="0 0 640 512" aria-hidden="true">
          <path d="M624 352h-16V243.9c0-12.7-5.1-24.9-14.1-33.9L494 110.1c-9-9-21.2-14.1-33.9-14.1H416V48c0-26.5-21.5-48-48-48H48C21.5 0 0 21.5 0 48v320c0 26.5 21.5 48 48 48h16c0 53 43 96 96 96s96-43 96-96h128c0 53 43 96 96 96s96-43 96-96h48c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16zM160 464c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm320 0c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zM416 160h44.1l85.9 85.9V256H416v-96zM276 188c0 6.6-5.4 12-12 12h-40v40c0 6.6-5.4 12-12 12h-24c-6.6 0-12-5.4-12-12v-40h-40c-6.6 0-12-5.4-12-12v-24c0-6.6 5.4-12 12-12h40v-40c0-6.6 5.4-12 12-12h24c6.6 0 12 5.4 12 12v40h40c6.6 0 12 5.4 12 12v24z"/>
        </svg>
        <div class="count" id="ambCount">–</div>
      </div>
      <p class="label">ambulance responses (ACTAS)</p>

      <div class="divider"></div>

      <div class="row">
        <!-- fire truck icon -->
        <svg viewBox="0 0 640 512" aria-hidden="true">
          <path d="M64 160h32v96H32v-96c0-17.7 14.3-32 32-32h0c0 17.7 0 32 0 32zm512-32c17.7 0 32 14.3 32 32v32h-64v-32c0-17.7 14.3-32 32-32zM48 96C21.5 96 0 117.5 0 144v224c0 8.8 7.2 16 16 16h32c0 53 43 96 96 96s96-43 96-96h128c0 53 43 96 96 96s96-43 96-96h32c8.8 0 16-7.2 16-16v-96c0-35.3-28.7-64-64-64h-32V96c0-17.7-14.3-32-32-32H272c-17.7 0-32 14.3-32 32v32H48zm96 304c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm320 0c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48z"/>
        </svg>
        <div class="count" id="fireCount">–</div>
      </div>
      <p class="label">fire responses (ACTF&R / RFS)</p>
    </div>

    <div class="footer">
      <span id="status"><span class="status-dot"></span>connecting…</span><br>
      Source: <a href="https://esa.act.gov.au/?fullmap=true" target="_blank" rel="noopener">ACT ESA incidents feed</a> (CC BY 4.0).
      Counts unique incidents seen in the rolling 24h window.
    </div>
  </div>

<script>
  let prevAmb = null, prevFire = null;

  function flash(el) {
    el.classList.remove('flash');
    void el.offsetWidth;        // reflow to restart animation
    el.classList.add('flash');
  }

  async function refresh() {
    const statusEl = document.getElementById('status');
    try {
      const r = await fetch('/api/tally', { cache: 'no-store' });
      const d = await r.json();

      const amb = document.getElementById('ambCount');
      const fire = document.getElementById('fireCount');
      amb.textContent = d.ambulance;
      fire.textContent = d.fire;
      if (prevAmb !== null && d.ambulance !== prevAmb) flash(amb);
      if (prevFire !== null && d.fire !== prevFire) flash(fire);
      prevAmb = d.ambulance; prevFire = d.fire;

      let cls = 'status-dot', txt = 'live';
      if (d.lastError) { cls += ' err'; txt = 'feed error — showing last good data'; }
      else if (d.lastPoll) {
        const age = (Date.now() - new Date(d.lastPoll)) / 1000;
        if (age > 180) { cls += ' stale'; txt = 'data stale'; }
      }
      const t = d.lastPoll ? new Date(d.lastPoll).toLocaleTimeString() : '—';
      statusEl.innerHTML =
        `<span class="${cls}"></span>${txt} · updated ${t} · ${d.total} total`;
    } catch (e) {
      statusEl.innerHTML =
        `<span class="status-dot err"></span>cannot reach server`;
    }
  }

  refresh();
  setInterval(refresh, 15000);   // UI re-reads server state every 15s
</script>
</body>
</html>
